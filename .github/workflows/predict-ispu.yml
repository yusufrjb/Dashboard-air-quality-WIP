name: Hourly ISPU Prediction

on:
  schedule:
    - cron: '0 * * * *'  # Every hour at minute 0
  workflow_dispatch:  # Manual trigger
  repository_dispatch:
    types: [predict]

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas numpy xgboost scikit-learn supabase python-dotenv joblib
      
      - name: Run prediction script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python ml_model/predict_time_series.py --json
      
      - name: Upload prediction logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prediction-logs
          path: prediction_log.txt
          retention-days: 7